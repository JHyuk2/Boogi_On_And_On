name: boogi_on_and_on
description: MVP onboarding flow for Boogi On & On - Mental Care & Habit Tracker app.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5
  flutter_riverpod: ^2.4.9
  flutter_animate: ^4.5.0

  # 한국어 로케일 지원을 위한 Flutter 공식 로컬라이제이션 패키지
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ── 로컬 폰트 에셋 등록 (폰트 흐릿함/Faux Bold 방지를 위한 가중치별 등록) ──
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSansKR-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansKR-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansKR-Bold.ttf
          weight: 700

